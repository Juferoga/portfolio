    Perfil:
      - Ingeniero de Sistemas que construye productos de principio a fin en el sector
        financiero, desde la definición del alcance hasta la fiabilidad en producción.
        Experiencia sólida en **backend escalable** (Java/Spring Boot, Python/Django,
        Node.js), arquitectura de microservicios, **infraestructura como código en AWS**
        y frontend moderno. Integro herramientas de **IA (Anthropic Claude, Prompt Flow)**
        como acelerador real de mi flujo de desarrollo y del equipo. Formación en
        codificación segura y criptografía aplicada. Ex-Director del Grupo GNU/Linux
        de la Universidad Distrital. *"Cambiando el mundo una línea a la vez."*
