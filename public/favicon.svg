<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ligadura JF: un solo tallo compartido — arriba forma la F, abajo se curva como la J -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3dff70"/>
      <stop offset="1" stop-color="#00c853"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="47" fill="url(#g)" stroke="#0b7a35" stroke-width="3"/>
  <g fill="#06170c">
    <!-- barra superior -->
    <rect x="26" y="20" width="56" height="11"/>
    <!-- brazo medio de la F -->
    <rect x="55" y="46" width="25" height="11"/>
    <!-- tallo único que baja y se curva en gancho de J -->
    <path d="M 44 20
             L 55 20
             L 55 62
             A 17 17 0 0 1 21 62
             L 21 56
             L 32 56
             L 32 62
             A 6 6 0 0 0 44 62
             Z"/>
  </g>
</svg>
